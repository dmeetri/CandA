{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <link rel="stylesheet" href="{% static 'aside.css' %}">
  {% block extra_css %}{% endblock %}
  <title>C&N | {% block title %}Дашборд{% endblock %}</title>
</head>
<body>
  <div id="mobile-aside-content" class="mobile-aside-content">
    <div class="mobile-aside-nav gap-v-10">
      <nav class="aside-navigation mobile">
        <a href="#" class="a-aside-nav-hover text-regular font-normal">Дашборд</a>
        <a href="{% url 'fileslist' %}" class="a-aside-nav-hover text-regular font-normal">Файлы</a>
        <a href="{% url 'userslist' %}" class="a-aside-nav-hover text-regular font-normal">Пользователи</a>
      </nav>
    </div>
  </div>

  <button id="show-burger-button" class="show-aside-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><title>Burger-classic SVG Icon</title><path fill="currentColor" d="M4 6a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1m0 6a1 1 0 0 1 1-1h14a1 1 0 1 1 0 2H5a1 1 0 0 1-1-1m1 5a1 1 0 1 0 0 2h14a1 1 0 1 0 0-2z"/></svg>
  </button>

  <div class="root-container">
    <aside>
      <div class="aside-container">
        <div class="aside-header-content">
          <h1>C&N</h1>
        </div>

        <nav class="aside-navigation">
          <a href="#" class="a-aside-nav-hover text-regular font-normal">Дашборд</a>
          <a href="{% url 'fileslist' %}" class="a-aside-nav-hover text-regular font-normal">Файлы</a>
          <a href="{% url 'userslist' %}" class="a-aside-nav-hover text-regular font-normal">Пользователи</a>
        </nav>

        <div class="profile-button">
          <a href="#" class="a-aside-nav-hover text-regular font-normal">Профиль</a>
        </div>

        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="text-regular font-normal">Выйти</button>
          </form>
      </div>
    </aside>

    <main>
      {% block content %}
        {{ cpu_load }}
      {% endblock %}
    </main>
  </div>
</body>

<script>
  const btn = document.getElementById('show-burger-button');
  const content = document.getElementById('mobile-aside-content');

  btn.addEventListener('click', () => {
    if (content.style.display === 'none') content.style.display = 'block';
    else content.style.display = 'none';
  });
</script>
</html>
