services:
  web:
    build: .
    container_name: django_app
    working_dir: /app
    command: gunicorn CN.wsgi:application --bind 0.0.0.0:8000 --workers 3
    volumes:
      - ./CN:/app
      - static_volume:/app/static
      - media_volume:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=CN.settings
      - PYTHONPATH=/app
      - DEBUG=False
    env_file:
      - CN/.env
    restart: unless-stopped
    networks:
      - app_network

  nginx:
    image: nginx:alpine
    container_name: nginx_app
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - app_network

volumes:
  static_volume:
  media_volume:

networks:
  app_network:
    driver: bridge